<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>口腔数字化质控系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #cbd5e1; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- Icons Helper ---
        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        // --- Mock Data ---
        const INITIAL_CASES = [
            { id: '20260204-0001', patientId: 'P1001', restorationType: '单冠', status: 'PENDING', time: '2026-03-27 09:44:00', doctor: '张医生', aiStatus: 'NOT_STARTED' },
            { id: '20260203-ERR-001', patientId: 'P1002', restorationType: '三单位桥', status: 'RESCAN_REQ', time: '2026-03-26 14:20:00', doctor: '李医生', aiStatus: 'COMPLETED' },
            { id: '20260202-DONE-001', patientId: 'P1003', restorationType: '嵌体', status: 'PASS', time: '2026-03-25 10:15:00', doctor: '王医生', aiStatus: 'COMPLETED', finalDecision: 'ACCEPT' }
        ];

        // --- Components ---

        const LoginPage = ({ onLogin }) => (
            <div className="min-h-screen flex items-center justify-center bg-slate-50">
                <div className="w-full max-w-md p-8 bg-white rounded-3xl shadow-xl border border-slate-100 animate-fade-in">
                    <div className="flex items-center gap-3 mb-8 justify-center">
                        <div className="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center shadow-lg shadow-blue-200">
                            <Icon name="brain-circuit" size={28} className="text-white" />
                        </div>
                        <h1 className="text-2xl font-bold text-slate-900 tracking-tight">口腔数字化质控系统</h1>
                    </div>
                    <div className="space-y-5">
                        <div>
                            <label className="block text-sm font-semibold text-slate-700 mb-2">账号</label>
                            <input type="text" className="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 outline-none transition-all" placeholder="请输入账号" defaultValue="admin" />
                        </div>
                        <div>
                            <label className="block text-sm font-semibold text-slate-700 mb-2">密码</label>
                            <input type="password" className="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 outline-none transition-all" placeholder="请输入密码" defaultValue="******" />
                        </div>
                        <button onClick={onLogin} className="w-full py-4 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-bold shadow-lg shadow-blue-500/20 transition-all active:scale-[0.98] mt-4">
                            登录系统
                        </button>
                    </div>
                </div>
            </div>
        );

        const CaseDetail = ({ caseData, onClose, onStatusChange }) => {
            const [selectedFile, setSelectedFile] = useState(`${caseData.id}-upperjaw.ply`);
            const [aiExecuted, setAiExecuted] = useState(caseData.aiStatus === 'COMPLETED');
            const [isExecutingAI, setIsExecutingAI] = useState(false);
            const [manualDecision, setManualDecision] = useState(null);
            const [manualReviews, setManualReviews] = useState({});
            const [doctorRemarks, setDoctorRemarks] = useState('');

            const filenames = [`${caseData.id}-upperjaw.ply`, `${caseData.id}-lowerjaw.ply`, `${caseData.id}-scanbody.ply`];

            const handleExecuteAI = () => {
                setIsExecutingAI(true);
                setTimeout(() => {
                    setIsExecutingAI(false);
                    setAiExecuted(true);
                    const nextStatus = Math.random() > 0.5 ? 'PASS' : 'RESCAN_REQ';
                    onStatusChange(caseData.id, nextStatus);
                }, 2000);
            };

            const handleFinalDecision = (status, decision) => {
                onStatusChange(caseData.id, status, doctorRemarks, decision);
                onClose();
            };

            return (
                <div className="flex flex-col h-full bg-white animate-fade-in">
                    <header className="h-16 border-b border-slate-100 flex items-center justify-between px-6 shrink-0">
                        <div className="flex flex-col">
                            <h2 className="text-lg font-bold text-slate-900 flex items-center gap-2">
                                <Icon name="file-text" size={18} className="text-blue-600" />
                                订单编号：{caseData.id}
                            </h2>
                            <div className="flex items-center gap-2 mt-0.5">
                                <span className={`inline-flex items-center px-2 py-0.5 rounded text-[10px] font-bold border uppercase tracking-wider ${
                                    caseData.status === 'PASS' ? 'bg-emerald-50 text-emerald-600 border-emerald-100' :
                                    caseData.status === 'RESCAN_REQ' ? 'bg-orange-50 text-orange-600 border-orange-100' : 'bg-blue-50 text-blue-600 border-blue-100'
                                }`}>
                                    状态：{caseData.status === 'PASS' ? '已完成' : caseData.status === 'RESCAN_REQ' ? '异常待处理' : '待质检'}
                                </span>
                            </div>
                        </div>
                        <button onClick={onClose} className="p-2 hover:bg-slate-100 rounded-full text-slate-400 transition-colors"><Icon name="x" size={20} /></button>
                    </header>

                    <div className="bg-slate-50 border-b border-slate-100 px-6 py-2 flex justify-center gap-3">
                        {filenames.map(file => (
                            <button key={file} onClick={() => setSelectedFile(file)} className={`px-4 py-2 rounded-lg text-xs transition-all border font-medium ${selectedFile === file ? 'bg-blue-600 text-white border-blue-600 shadow-sm' : 'bg-white text-slate-500 border-slate-200 hover:border-blue-400 hover:text-blue-600'}`}>{file}</button>
                        ))}
                    </div>

                    <div className="flex flex-1 overflow-hidden">
                        <div className="w-[70%] bg-[#F8FAFC] flex items-center justify-center relative border-r border-slate-100">
                            <div className="text-slate-300 flex flex-col items-center gap-4">
                                <Icon name="box" size={64} />
                                <span className="text-sm font-medium">3D 模型展示区域 ({selectedFile})</span>
                            </div>
                            <div className="absolute bottom-6 left-6"><button className="bg-white p-2.5 rounded-xl shadow-lg text-slate-600 border border-slate-100"><Icon name="rotate-ccw" size={20} /></button></div>
                        </div>

                        <div className="w-[30%] flex flex-col bg-white overflow-hidden">
                            <div className="flex-1 overflow-y-auto p-6 custom-scrollbar">
                                {caseData.status === 'PENDING' && !aiExecuted ? (
                                    <div className="space-y-8">
                                        <div className="text-center py-8 border-2 border-dashed border-slate-100 rounded-2xl bg-slate-50/50">
                                            <div className="w-16 h-16 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-4"><Icon name="brain-circuit" size={32} /></div>
                                            <h3 className="text-lg font-bold text-slate-800 mb-2">AI 辅助质检</h3>
                                            <p className="text-sm text-slate-500 px-6">系统将自动分析边缘线、倒凹及咬合关系，为您提供决策参考。</p>
                                            <button onClick={handleExecuteAI} disabled={isExecutingAI} className="mt-6 px-8 py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-bold shadow-lg shadow-blue-500/20 transition-all flex items-center gap-2 mx-auto disabled:opacity-50">
                                                {isExecutingAI ? <Icon name="refresh-cw" className="animate-spin" /> : <Icon name="play" />}
                                                {isExecutingAI ? '正在分析...' : '执行 AI 质检'}
                                            </button>
                                        </div>
                                        <div className="p-6 border border-slate-100 rounded-2xl bg-white shadow-sm">
                                            <h3 className="text-base font-bold text-slate-800 mb-4">人工直接判定</h3>
                                            <div className="space-y-3 mb-2">
                                                {['ACCEPT', 'RESCAN'].map(type => (
                                                    <label key={type} className="flex items-center gap-3 p-3 rounded-xl border border-slate-100 hover:bg-slate-50 cursor-pointer transition-colors">
                                                        <input type="radio" name="manualDecision" className="w-4 h-4 text-blue-600" checked={manualDecision === type} onChange={() => setManualDecision(type)} />
                                                        <span className="text-sm text-slate-700 font-medium">{type === 'ACCEPT' ? '数据合格' : '数据不合格'}</span>
                                                    </label>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                ) : (caseData.status === 'RESCAN_REQ' || aiExecuted) && (
                                    <div className="space-y-6">
                                        <h3 className="font-bold text-slate-800 flex items-center gap-2 text-base"><Icon name="sparkles" size={18} className="text-blue-500" />AI 检测结果</h3>
                                        <div className="space-y-5">
                                            {[1, 2].map(i => (
                                                <div key={i} className="p-5 rounded-2xl border border-slate-100 bg-white shadow-sm">
                                                    <div className="mb-2"><span className="font-bold text-sm text-slate-800">检测项 {i}</span></div>
                                                    <p className="text-xs text-slate-500 leading-relaxed mb-4">此处显示 AI 自动检测出的异常描述信息。</p>
                                                    {caseData.status === 'RESCAN_REQ' && (
                                                        <div className="pt-4 border-t border-slate-50">
                                                            <p className="text-[11px] font-bold text-slate-400 uppercase tracking-wider mb-3">人工复核：</p>
                                                            <div className="flex gap-4">
                                                                {['agree', 'disagree'].map(v => (
                                                                    <label key={v} className="flex items-center gap-2 cursor-pointer">
                                                                        <input type="radio" name={`review-${i}`} className="w-4 h-4 text-blue-600" />
                                                                        <span className="text-xs text-slate-600">{v === 'agree' ? '同意AI判断' : '不同意AI判断'}</span>
                                                                    </label>
                                                                ))}
                                                            </div>
                                                        </div>
                                                    )}
                                                </div>
                                            ))}
                                        </div>
                                        {caseData.status === 'RESCAN_REQ' && (
                                            <div className="pt-4">
                                                <h4 className="text-sm font-bold text-slate-800 mb-3 flex items-center gap-2"><Icon name="message-square" size={16} className="text-slate-400" />医生备注</h4>
                                                <textarea className="w-full h-32 p-4 rounded-xl border border-slate-200 focus:border-blue-500 outline-none text-sm resize-none" placeholder="请输入复核说明（可选）" value={doctorRemarks} onChange={e => setDoctorRemarks(e.target.value)}></textarea>
                                            </div>
                                        )}
                                    </div>
                                )}
                            </div>
                            {caseData.status !== 'PASS' && (
                                <div className="p-6 border-t border-slate-100 bg-white flex justify-end gap-4 shadow-[0_-4px_20px_-10px_rgba(0,0,0,0.05)]">
                                    <button onClick={() => handleFinalDecision('PASS', 'ACCEPT')} className="flex-1 py-4 bg-blue-600 text-white rounded-2xl font-bold hover:bg-blue-700 transition-all shadow-lg shadow-blue-500/20 active:scale-[0.98]">数据可接受</button>
                                    <button onClick={() => handleFinalDecision('PASS', 'RESCAN')} className="flex-1 py-4 bg-red-600 text-white rounded-2xl font-bold hover:bg-red-700 transition-all shadow-lg shadow-red-500/20 active:scale-[0.98]">需补扫</button>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const Workbench = () => {
            const [activeTab, setActiveTab] = useState('PENDING');
            const [cases, setCases] = useState(INITIAL_CASES);
            const [selectedCase, setSelectedCase] = useState(null);
            const [search, setSearch] = useState('');

            const filteredCases = cases.filter(c => (activeTab === 'ALL' || c.status === activeTab) && (c.id.includes(search) || c.patientId.includes(search)));

            return (
                <div className="flex h-screen bg-slate-50 overflow-hidden">
                    <aside className="w-64 bg-slate-900 flex flex-col shrink-0">
                        <div className="p-6 flex items-center gap-3 border-b border-slate-800/50">
                            <div className="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center"><Icon name="brain-circuit" size={24} className="text-white" /></div>
                            <span className="text-white font-bold tracking-tight">口扫质控系统</span>
                        </div>
                        <nav className="flex-1 p-4 space-y-2">
                            <div className="px-4 py-3 bg-blue-600/10 text-blue-400 rounded-xl flex items-center gap-3 font-semibold"><Icon name="layout-dashboard" size={20} />质检工作台</div>
                            <div className="px-4 py-3 text-slate-400 hover:bg-slate-800/50 rounded-xl flex items-center gap-3 transition-colors cursor-pointer"><Icon name="settings" size={20} />系统设置</div>
                        </nav>
                        <div className="p-4 border-t border-slate-800/50"><div className="px-4 py-3 text-slate-500 hover:text-red-400 flex items-center gap-3 transition-colors cursor-pointer"><Icon name="log-out" size={20} />退出系统</div></div>
                    </aside>

                    <main className="flex-1 flex flex-col min-w-0">
                        <header className="h-16 bg-white border-b border-slate-100 flex items-center justify-between px-8 shrink-0">
                            <h2 className="text-xl font-bold text-slate-800">质检工作台</h2>
                            <div className="flex items-center gap-4">
                                <div className="w-10 h-10 bg-slate-100 rounded-full flex items-center justify-center text-slate-500 font-bold">AD</div>
                            </div>
                        </header>

                        <div className="flex-1 p-8 overflow-y-auto custom-scrollbar">
                            <div className="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden">
                                <div className="p-6 border-b border-slate-50 flex items-center justify-between gap-4 flex-wrap">
                                    <div className="flex bg-slate-100 p-1 rounded-xl">
                                        {[
                                            { id: 'RESCAN_REQ', label: '异常待处理' },
                                            { id: 'PENDING', label: '待质检' },
                                            { id: 'PASS', label: '已完成' },
                                            { id: 'ALL', label: '全部' }
                                        ].map(tab => (
                                            <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`px-6 py-2 rounded-lg text-sm font-bold transition-all ${activeTab === tab.id ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}>{tab.label}</button>
                                        ))}
                                    </div>
                                    <div className="flex-1 max-w-md relative">
                                        <Icon name="search" size={18} className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" />
                                        <input type="text" className="w-full pl-11 pr-4 py-3 bg-slate-50 border-none rounded-xl focus:ring-2 focus:ring-blue-500/20 outline-none text-sm" placeholder="搜索患者姓名、订单编号..." value={search} onChange={e => setSearch(e.target.value)} />
                                    </div>
                                </div>

                                <div className="overflow-x-auto">
                                    <table className="w-full text-left border-collapse">
                                        <thead>
                                            <tr className="bg-slate-50/50 text-slate-400 text-[11px] font-bold uppercase tracking-wider">
                                                <th className="px-8 py-4">订单编号</th>
                                                <th className="px-8 py-4">患者ID</th>
                                                <th className="px-8 py-4">修复类型</th>
                                                <th className="px-8 py-4">订单时间</th>
                                                <th className="px-8 py-4">质检状态</th>
                                                <th className="px-8 py-4 text-right">操作</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-50">
                                            {filteredCases.map(c => (
                                                <tr key={c.id} className="hover:bg-slate-50/50 transition-colors group">
                                                    <td className="px-8 py-5 font-bold text-slate-700">{c.id}</td>
                                                    <td className="px-8 py-5 text-slate-500">{c.patientId}</td>
                                                    <td className="px-8 py-5 text-slate-500">{c.restorationType}</td>
                                                    <td className="px-8 py-5 text-slate-400 text-xs">{c.time}</td>
                                                    <td className="px-8 py-5">
                                                        <span className={`px-2 py-1 rounded-md text-[10px] font-bold border ${
                                                            c.status === 'PASS' ? 'bg-emerald-50 text-emerald-600 border-emerald-100' :
                                                            c.status === 'RESCAN_REQ' ? 'bg-orange-50 text-orange-600 border-orange-100' : 'bg-blue-50 text-blue-600 border-blue-100'
                                                        }`}>{c.status === 'PASS' ? '已完成' : c.status === 'RESCAN_REQ' ? '异常待处理' : '待质检'}</span>
                                                    </td>
                                                    <td className="px-8 py-5 text-right">
                                                        <button onClick={() => setSelectedCase(c)} className="px-4 py-2 bg-slate-100 group-hover:bg-blue-600 group-hover:text-white text-slate-600 rounded-lg text-xs font-bold transition-all">查看详情</button>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </main>

                    {selectedCase && (
                        <div className="fixed inset-0 z-50 flex justify-end bg-slate-900/40 backdrop-blur-sm" onClick={() => setSelectedCase(null)}>
                            <div className="w-[85vw] max-w-7xl h-full bg-white shadow-2xl animate-in slide-in-from-right duration-300" onClick={e => e.stopPropagation()}>
                                <CaseDetail 
                                    caseData={selectedCase} 
                                    onClose={() => setSelectedCase(null)} 
                                    onStatusChange={(id, newStatus, remarks, decision) => {
                                        const updatedCase = { ...selectedCase, status: newStatus, doctorRemarks: remarks, finalDecision: decision, aiStatus: 'COMPLETED' };
                                        setCases(prev => prev.map(c => c.id === id ? updatedCase : c));
                                        setSelectedCase(updatedCase);
                                    }}
                                />
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const App = () => {
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            return isLoggedIn ? <Workbench /> : <LoginPage onLogin={() => setIsLoggedIn(true)} />;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</body>
</html>
